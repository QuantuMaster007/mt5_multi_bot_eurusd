symbol: EURUSD

# Used as fallback if symbol_info is unavailable
fallback:
  pip_value: 0.0001
  min_lot: 0.01
  max_lot: 100.0
  lot_step: 0.01
  spread_warn_pips: 2.0
  spread_block_pips: 4.0
  stops_level: 10           # minimum distance in points
  freeze_level: 0

# Session windows (UTC) when trading is considered active
sessions:
  london:
    start: "07:00"
    end: "16:00"
  new_york:
    start: "12:00"
    end: "21:00"
  overlap:
    start: "12:00"
    end: "16:00"

preferred_sessions: [london, new_york, overlap]
avoid_sessions_before_open_minutes: 15
avoid_sessions_after_close_minutes: 15
