logging:
  level: INFO                        # DEBUG | INFO | WARNING | ERROR
  console: true
  file: true
  file_path: data/logs/system.log
  json_events_path: data/events/events.jsonl
  trade_log_path: data/trades/trades.jsonl
  max_bytes: 10485760                # 10 MB per file
  backup_count: 7
  format: "%(asctime)s | %(levelname)-8s | %(name)-25s | %(message)s"
